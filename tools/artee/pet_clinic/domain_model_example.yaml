# values must be in snake_case!
modules:
  - name: patient_management
    description: Module for managing pets and their medical records
    bounded_context: The core domain responsible for managing pet patients and their associated medical histories. This module encapsulates all business logic related to pet registration, medical records, vaccinations, and health tracking. It serves as the central point of interaction for all pet-related data within the system.
    responsibility: This module is responsible for managing pet patient records, including registration, medical history, vaccination records, and health status tracking. It defines the core business logic associated with pet health management and serves as the authoritative source of pet data across the system.
    defaultQueries: true
    aggregates:
      - name: pet
        description: Represents a pet patient registered at the clinic
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
          - name: breed
            type: string
            optional: true
          - name: date_of_birth
            type: string
            optional: true
          - name: gender
            type: string
            optional: false
          - name: weight
            type: float32
            optional: true
          - name: microchip_number
            type: string
            optional: true
          - name: status
            type: string
            optional: false
      - name: medical_record
        description: Represents the medical history and records for a pet
        fields:
          - name: medical_record_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: visit_date
            type: string
            optional: false
          - name: diagnosis
            type: string
            optional: true
          - name: treatment
            type: string
            optional: true
          - name: notes
            type: string
            optional: true
          - name: follow_up_required
            type: bool
            optional: false
      - name: vaccination_record
        description: Represents a vaccination record for a pet
        fields:
          - name: vaccination_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: administered_date
            type: string
            optional: false
          - name: expiry_date
            type: string
            optional: true
          - name: administered_by
            type: string
            optional: false
    commands:
      - name: register_pet
        description: Register a new pet patient at the clinic
        events_emitted:
          - pet_registered
        params:
          - name: owner_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
          - name: breed
            type: string
            optional: true
          - name: date_of_birth
            type: string
            optional: true
          - name: gender
            type: string
            optional: false
          - name: weight
            type: float32
            optional: true
          - name: microchip_number
            type: string
            optional: true
      - name: update_pet_details
        description: Update the details of a registered pet
        events_emitted:
          - pet_details_updated
        params:
          - name: pet_id
            type: string
            optional: false
          - name: name
            type: string
            optional: true
          - name: weight
            type: float32
            optional: true
          - name: microchip_number
            type: string
            optional: true
      - name: add_medical_record
        description: Add a new medical record entry for a pet
        events_emitted:
          - medical_record_added
        params:
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: visit_date
            type: string
            optional: false
          - name: diagnosis
            type: string
            optional: true
          - name: treatment
            type: string
            optional: true
          - name: notes
            type: string
            optional: true
          - name: follow_up_required
            type: bool
            optional: false
      - name: record_vaccination
        description: Record a vaccination administered to a pet
        events_emitted:
          - vaccination_recorded
          - vaccination_due_reminder_scheduled
        params:
          - name: pet_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: administered_date
            type: string
            optional: false
          - name: expiry_date
            type: string
            optional: true
          - name: administered_by
            type: string
            optional: false
      - name: deactivate_pet
        description: Mark a pet as inactive in the system
        events_emitted:
          - pet_deactivated
        params:
          - name: pet_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
    events:
      - name: pet_registered
        description: Event triggered when a new pet is registered at the clinic
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
      - name: pet_details_updated
        description: Event triggered when pet details are updated
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: updated_fields
            type: string
            optional: false
      - name: medical_record_added
        description: Event triggered when a new medical record is added for a pet
        kind: emitted
        fields:
          - name: medical_record_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: visit_date
            type: string
            optional: false
          - name: follow_up_required
            type: bool
            optional: false
      - name: vaccination_recorded
        description: Event triggered when a vaccination is recorded for a pet
        kind: emitted
        fields:
          - name: vaccination_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: expiry_date
            type: string
            optional: true
      - name: vaccination_due_reminder_scheduled
        description: Event triggered to schedule a reminder for upcoming vaccination renewal
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: expiry_date
            type: string
            optional: false
      - name: pet_deactivated
        description: Event triggered when a pet is marked as inactive
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
      - name: appointment_completed
        description: Event consumed when an appointment is completed to trigger medical record creation
        kind: consumed
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
    queries:

  - name: owner_management
    description: Module for managing pet owners and their profiles
    bounded_context: The domain responsible for managing pet owner accounts, contact information, and relationships with their pets. This module handles owner registration, profile management, and communication preferences. It acts as the authoritative source for owner identity and contact data across the system.
    responsibility: This module is responsible for managing pet owner profiles, including registration, contact information, communication preferences, and loyalty program membership. It defines the business rules around owner identity and serves as the central reference for owner data consumed by other modules.
    defaultQueries: true
    aggregates:
      - name: owner
        description: Represents a pet owner registered with the clinic
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: address
            type: string
            optional: true
          - name: communication_preference
            type: string
            optional: false
          - name: loyalty_member
            type: bool
            optional: false
          - name: loyalty_points
            type: int32
            optional: true
          - name: status
            type: string
            optional: false
      - name: loyalty_account
        description: Represents a loyalty program account for a pet owner
        fields:
          - name: loyalty_account_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: points_balance
            type: int32
            optional: false
          - name: tier
            type: string
            optional: false
          - name: enrolled_date
            type: string
            optional: false
    commands:
      - name: register_owner
        description: Register a new pet owner with the clinic
        events_emitted:
          - owner_registered
        params:
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: address
            type: string
            optional: true
          - name: communication_preference
            type: string
            optional: false
      - name: update_owner_profile
        description: Update the profile information of a pet owner
        events_emitted:
          - owner_profile_updated
        params:
          - name: owner_id
            type: string
            optional: false
          - name: email
            type: string
            optional: true
          - name: phone_number
            type: string
            optional: true
          - name: address
            type: string
            optional: true
          - name: communication_preference
            type: string
            optional: true
      - name: enroll_in_loyalty_program
        description: Enroll a pet owner in the clinic loyalty program
        events_emitted:
          - owner_enrolled_in_loyalty_program
        params:
          - name: owner_id
            type: string
            optional: false
      - name: award_loyalty_points
        description: Award loyalty points to an owner's account
        events_emitted:
          - loyalty_points_awarded
        params:
          - name: owner_id
            type: string
            optional: false
          - name: points
            type: int32
            optional: false
          - name: reason
            type: string
            optional: false
      - name: redeem_loyalty_points
        description: Redeem loyalty points from an owner's account
        events_emitted:
          - loyalty_points_redeemed
        params:
          - name: owner_id
            type: string
            optional: false
          - name: points
            type: int32
            optional: false
      - name: deactivate_owner
        description: Deactivate a pet owner account
        events_emitted:
          - owner_deactivated
        params:
          - name: owner_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
    events:
      - name: owner_registered
        description: Event triggered when a new pet owner is registered
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
      - name: owner_profile_updated
        description: Event triggered when an owner's profile is updated
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: updated_fields
            type: string
            optional: false
      - name: owner_enrolled_in_loyalty_program
        description: Event triggered when an owner is enrolled in the loyalty program
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: loyalty_account_id
            type: string
            optional: false
          - name: enrolled_date
            type: string
            optional: false
      - name: loyalty_points_awarded
        description: Event triggered when loyalty points are awarded to an owner
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: points
            type: int32
            optional: false
          - name: new_balance
            type: int32   
            optional: false
      - name: loyalty_points_redeemed
        description: Event triggered when loyalty points are redeemed by an owner
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: points
            type: int32
            optional: false
          - name: new_balance
            type: int32
            optional: false
      - name: owner_deactivated
        description: Event triggered when an owner account is deactivated
        kind: emitted
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
      - name: service_payment_completed
        description: Event consumed to trigger loyalty points award after a payment
        kind: consumed
        fields:
          - name: owner_id
            type: string
            optional: false
          - name: amount_paid
            type: float32
            optional: false
          - name: service_type
            type: string
            optional: false
    queries:

  - name: appointment_scheduling
    description: Module for managing appointment scheduling and telemedicine sessions
    bounded_context: The domain responsible for managing the full lifecycle of appointments at the clinic, including in-person visits and telemedicine sessions. This module handles scheduling, rescheduling, cancellations, and reminders. It coordinates between pet owners, veterinarians, and clinic resources to ensure efficient scheduling.
    responsibility: This module is responsible for managing appointment scheduling, including creation, modification, cancellation, and status tracking of appointments. It enforces scheduling business rules such as availability checks and conflict prevention, and coordinates with other modules through events to trigger downstream workflows.
    defaultQueries: true
    aggregates:
      - name: appointment
        description: Represents a scheduled appointment at the clinic
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: appointment_type
            type: string
            optional: false
          - name: scheduled_date
            type: string
            optional: false
          - name: scheduled_time
            type: string
            optional: false
          - name: duration_minutes
            type: int32
            optional: false
          - name: status
            type: string
            optional: false
          - name: notes
            type: string
            optional: true
          - name: is_telemedicine
            type: bool
            optional: false
      - name: telemedicine_session
        description: Represents a telemedicine session linked to an appointment
        fields:
          - name: session_id
            type: string
            optional: false
          - name: appointment_id
            type: string
            optional: false
          - name: session_url
            type: string
            optional: false
          - name: started_at
            type: string
            optional: true
          - name: ended_at
            type: string
            optional: true
          - name: status
            type: string
            optional: false
    commands:
      - name: schedule_appointment
        description: Schedule a new appointment for a pet
        events_emitted:
          - appointment_scheduled
          - appointment_reminder_scheduled
        params:
          - name: pet_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: appointment_type
            type: string
            optional: false
          - name: scheduled_date
            type: string
            optional: false
          - name: scheduled_time
            type: string
            optional: false
          - name: duration_minutes
            type: int32
            optional: false
          - name: notes
            type: string
            optional: true
          - name: is_telemedicine
            type: bool
            optional: false
      - name: reschedule_appointment
        description: Reschedule an existing appointment to a new date and time
        events_emitted:
          - appointment_rescheduled
          - appointment_reminder_scheduled
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: new_scheduled_date
            type: string
            optional: false
          - name: new_scheduled_time
            type: string
            optional: false
          - name: reason
            type: string
            optional: true
      - name: cancel_appointment
        description: Cancel an existing appointment
        events_emitted:
          - appointment_cancelled
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
          - name: cancelled_by
            type: string
            optional: false
      - name: confirm_appointment
        description: Confirm a scheduled appointment
        events_emitted:
          - appointment_confirmed
        params:
          - name: appointment_id
            type: string
            optional: false
      - name: complete_appointment
        description: Mark an appointment as completed
        events_emitted:
          - appointment_completed
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
      - name: start_telemedicine_session
        description: Start a telemedicine session for a scheduled telemedicine appointment
        events_emitted:
          - telemedicine_session_started
        params:
          - name: appointment_id
            type: string
            optional: false
      - name: end_telemedicine_session
        description: End an active telemedicine session
        events_emitted:
          - telemedicine_session_ended
        params:
          - name: session_id
            type: string
            optional: false
    events:
      - name: appointment_scheduled
        description: Event triggered when a new appointment is scheduled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: scheduled_date
            type: string
            optional: false
          - name: scheduled_time
            type: string
            optional: false
          - name: is_telemedicine
            type: bool
            optional: false
      - name: appointment_rescheduled
        description: Event triggered when an appointment is rescheduled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: new_scheduled_date
            type: string
            optional: false
          - name: new_scheduled_time
            type: string
            optional: false
      - name: appointment_cancelled
        description: Event triggered when an appointment is cancelled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
          - name: cancelled_by
            type: string
            optional: false
      - name: appointment_confirmed
        description: Event triggered when an appointment is confirmed
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
      - name: appointment_completed
        description: Event triggered when an appointment is completed
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
      - name: appointment_reminder_scheduled
        description: Event triggered to schedule a reminder notification for an appointment
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: owner_id
            type: string
            optional: false
          - name: scheduled_date
            type: string
            optional: false
          - name: scheduled_time
            type: string
            optional: false
      - name: telemedicine_session_started
        description: Event triggered when a telemedicine session is started
        kind: emitted
        fields:
          - name: session_id
            type: string
            optional: false
          - name: appointment_id
            type: string
            optional: false
          - name: session_url
            type: string
            optional: false
      - name: telemedicine_session_ended
        description: Event triggered when a telemedicine session ends
        kind: emitted
        fields:
          - name: session_id
            type: string
            optional: false
          - name: appointment_id
            type: string
            optional: false
          - name: ended_at
            type: string
            optional: false
    queries:

  - name: veterinary_staff
    description: Module for managing veterinarians and support staff
    bounded_context: The domain responsible for managing clinic staff including veterinarians and support personnel. This module handles staff profiles, specializations, availability schedules, and role assignments. It serves as the authoritative source for staff data and availability used by the scheduling and service delivery modules.
    responsibility: This module is responsible for managing veterinarian and support staff records, including their profiles, specializations, working schedules, and availability. It enforces business rules around staff management and provides availability data to the scheduling module.
    defaultQueries: true
    aggregates:
      - name: veterinarian
        description: Represents a veterinarian employed at the clinic
        fields:
          - name: veterinarian_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: license_number
            type: string
            optional: false
          - name: specializations
            type: string
            optional: true
          - name: status
            type: string
            optional: false
      - name: staff_member
        description: Represents a support staff member at the clinic
        fields:
          - name: staff_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: role
            type: string
            optional: false
          - name: status
            type: string
            optional: false
      - name: availability_schedule
        description: Represents the availability schedule for a veterinarian or staff member
        fields:
          - name: schedule_id
            type: string
            optional: false
          - name: staff_id
            type: string
            optional: false
          - name: day_of_week
            type: string
            optional: false
          - name: start_time
            type: string
            optional: false
          - name: end_time
            type: string
            optional: false
          - name: is_available
            type: bool
            optional: false
    commands:
      - name: onboard_veterinarian
        description: Onboard a new veterinarian to the clinic
        events_emitted:
          - veterinarian_onboarded
        params:
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: license_number
            type: string
            optional: false
          - name: specializations
            type: string
            optional: true
      - name: update_veterinarian_profile
        description: Update the profile of an existing veterinarian
        events_emitted:
          - veterinarian_profile_updated
        params:
          - name: veterinarian_id
            type: string
            optional: false
          - name: specializations
            type: string
            optional: true
          - name: phone_number
            type: string
            optional: true
          - name: email
            type: string
            optional: true
      - name: set_staff_availability
        description: Set or update the availability schedule for a staff member
        events_emitted:
          - staff_availability_updated
        params:
          - name: staff_id
            type: string
            optional: false
          - name: day_of_week
            type: string
            optional: false
          - name: start_time
            type: string
            optional: false
          - name: end_time
            type: string
            optional: false
          - name: is_available
            type: bool
            optional: false
      - name: deactivate_staff_member
        description: Deactivate a staff member from the clinic
        events_emitted:
          - staff_member_deactivated
        params:
          - name: staff_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
    events:
      - name: veterinarian_onboarded
        description: Event triggered when a new veterinarian is onboarded
        kind: emitted
        fields:
          - name: veterinarian_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: license_number
            type: string
            optional: false
      - name: veterinarian_profile_updated
        description: Event triggered when a veterinarian's profile is updated
        kind: emitted
        fields:
          - name: veterinarian_id
            type: string
            optional: false
          - name: updated_fields
            type: string
            optional: false
      - name: staff_availability_updated
        description: Event triggered when a staff member's availability is updated
        kind: emitted
        fields:
          - name: staff_id
            type: string
            optional: false
          - name: day_of_week
            type: string
            optional: false
          - name: is_available
            type: bool
            optional: false
      - name: staff_member_deactivated
        description: Event triggered when a staff member is deactivated
        kind: emitted
        fields:
          - name: staff_id
            type: string
            optional: false
          - name: reason
            type: string
            optional: false
    queries:

  - name: billing_and_payments
    description: Module for managing invoices, payments, and financial transactions
    bounded_context: The domain responsible for managing all financial transactions within the clinic, including invoicing for veterinary services, processing payments, and handling refunds. This module enforces billing business rules and integrates with the loyalty program and insurance claim workflows.
    responsibility: This module is responsible for generating invoices, processing payments, managing refunds, and maintaining financial transaction records. It coordinates with the owner management module to award loyalty points and with the insurance module to handle insurance-covered services.
    defaultQueries: true
    aggregates:
      - name: invoice
