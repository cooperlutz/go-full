  responsibility: This module manages client registration, profile maintenance, contact information, communication preferences, and client relationship tracking. It supports personalized care by maintaining comprehensive client records.
  defaultQueries: true
  aggregates:
    - name: client
      description: Represents a pet owner / client of the clinic
      fields:
