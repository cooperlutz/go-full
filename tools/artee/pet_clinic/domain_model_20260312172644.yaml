- name: appointment_management
  description: Module for scheduling and managing veterinary appointments
  bounded_context: The core scheduling domain responsible for managing all appointment lifecycle operations including booking, rescheduling, cancellation, and check-in/check-out. This module coordinates between clients, pets, veterinarians, and available time slots to ensure efficient clinic operations. It also supports online appointment scheduling as a key differentiator.
  responsibility: This module handles appointment creation, scheduling, rescheduling, cancellation, reminders, check-in, and check-out processes. It manages veterinarian availability and time slot allocation, and serves as the coordination point between clients and clinical services.
  defaultQueries: true
  aggregates:
    - name: appointment
      description: Represents a scheduled veterinary appointment
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: appointment_type
          type: string
          optional: false
        - name: scheduled_date
          type: date
          optional: false
        - name: scheduled_time
          type: string
          optional: false
        - name: duration_minutes
          type: int32
          optional: false
        - name: status
          type: string
          optional: false
        - name: reason
          type: string
          optional: true
        - name: notes
          type: string
          optional: true
        - name: is_emergency
          type: bool
          optional: false
    - name: veterinarian_schedule
      description: Represents a veterinarian's availability schedule
      fields:
        - name: schedule_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: date
          type: date
          optional: false
        - name: start_time
          type: string
          optional: false
        - name: end_time
          type: string
          optional: false
        - name: is_available
          type: bool
          optional: false
  commands:
    - name: schedule_appointment
      description: Schedule a new appointment for a pet
      events_emitted:
        - appointment_scheduled
      params:
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: appointment_type
          type: string
          optional: false
        - name: scheduled_date
          type: date
          optional: false
        - name: scheduled_time
          type: string
          optional: false
        - name: duration_minutes
          type: int32
          optional: false
        - name: reason
          type: string
          optional: true
        - name: is_emergency
          type: bool
          optional: false
    - name: reschedule_appointment
      description: Reschedule an existing appointment
      events_emitted:
        - appointment_rescheduled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: new_date
          type: date
          optional: false
        - name: new_time
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: true
    - name: cancel_appointment
      description: Cancel an existing appointment
      events_emitted:
        - appointment_cancelled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: cancellation_reason
          type: string
          optional: true
    - name: check_in_appointment
      description: Check in a client and pet for their appointment
      events_emitted:
        - appointment_checked_in
      params:
        - name: appointment_id
          type: string
          optional: false
    - name: complete_appointment
      description: Mark an appointment as completed
      events_emitted:
