        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: scheduled_date
          type: date
          optional: false
        - name: scheduled_time
          type: string
          optional: false
        - name: is_emergency
          type: bool
          optional: false
    - name: appointment_rescheduled
