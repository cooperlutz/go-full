modules:
- name: pet_registry
  description: Module for managing pets and their health profiles
  bounded_context: The core domain responsible for maintaining a comprehensive registry of all pets served by the clinic. This module captures pet identity, species, breed, medical history references, and ownership relationships. It serves as the authoritative source of truth for pet information across the entire system.
  responsibility: This module is responsible for registering pets, maintaining their profiles including species, breed, age, weight, and linking pets to their owners. It provides the foundational pet identity that other modules reference.
  defaultQueries: true
  aggregates:
    - name: pet
      description: Represents a pet registered at the clinic
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: species
          type: string
          optional: false
        - name: breed
          type: string
          optional: true
        - name: date_of_birth
          type: date
          optional: true
        - name: weight
          type: float
          optional: true
        - name: gender
          type: string
          optional: true
        - name: microchip_number
          type: string
          optional: true
        - name: owner_id
          type: string
          optional: false
        - name: status
          type: string
          optional: false
        - name: notes
          type: string
          optional: true
  commands:
    - name: register_pet
      description: Register a new pet in the system
      events_emitted:
        - pet_registered
      params:
        - name: name
          type: string
          optional: false
        - name: species
          type: string
          optional: false
        - name: breed
          type: string
          optional: true
        - name: date_of_birth
          type: date
          optional: true
        - name: weight
          type: float
          optional: true
        - name: gender
          type: string
          optional: true
        - name: microchip_number
          type: string
          optional: true
        - name: owner_id
          type: string
          optional: false
    - name: update_pet_profile
      description: Update an existing pet's profile information
      events_emitted:
        - pet_profile_updated
      params:
        - name: pet_id
          type: string
          optional: false
        - name: name
          type: string
          optional: true
        - name: weight
          type: float
          optional: true
        - name: notes
          type: string
          optional: true
    - name: transfer_pet_ownership
      description: Transfer ownership of a pet to a different owner
      events_emitted:
        - pet_ownership_transferred
      params:
        - name: pet_id
          type: string
          optional: false
        - name: new_owner_id
          type: string
          optional: false
    - name: deactivate_pet
      description: Mark a pet as inactive (deceased, transferred out, etc.)
      events_emitted:
        - pet_deactivated
      params:
        - name: pet_id
          type: string
          optional: false
        - name: reason
          type: string
          optional: false
  events:
    - name: pet_registered
      description: Event triggered when a new pet is registered
      kind: emitted
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: species
          type: string
          optional: false
        - name: owner_id
          type: string
          optional: false
    - name: pet_profile_updated
      description: Event triggered when a pet's profile is updated
      kind: emitted
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: name
          type: string
          optional: true
        - name: weight
          type: float
          optional: true
    - name: pet_ownership_transferred
      description: Event triggered when pet ownership is transferred
      kind: emitted
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: previous_owner_id
          type: string
          optional: false
        - name: new_owner_id
          type: string
          optional: false
    - name: pet_deactivated
      description: Event triggered when a pet is deactivated
      kind: emitted
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: reason
          type: string
          optional: false
  queries:
    - name: find_pets_by_owner
      description: Find all pets belonging to a specific owner
      params:
        - name: owner_id
          type: string
          optional: false
    - name: search_pets
      description: Search pets by name, species, or breed
      params:
        - name: name
          type: string
          optional: true
        - name: species
          type: string
          optional: true
        - name: breed
          type: string
          optional: true

