          type: string
          optional: false
        - name: first_name
          type: string
          optional: false
        - name: last_name
          type: string
          optional: false
        - name: email
          type: string
          optional: false
        - name: phone_number
          type: string
          optional: false
        - name: address
          type: string
          optional: true
        - name: preferred_contact_method
          type: string
          optional: true
