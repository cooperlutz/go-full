  bounded_context: The core clinical domain responsible for managing all aspects of veterinary medical care including examinations, diagnoses, treatments, prescriptions, vaccinations, surgeries, and medical records. This module captures the clinical workflow and medical history that forms the foundation of the clinic's value proposition.
  responsibility: This module manages clinical visits, medical examinations, diagnoses, treatment plans, prescriptions, vaccination records, surgical procedures, and comprehensive medical records for each pet. It ensures continuity of care and supports evidence-based veterinary medicine.
  defaultQueries: true
  aggregates:
