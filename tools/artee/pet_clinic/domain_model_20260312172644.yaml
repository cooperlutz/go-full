          type: string
          optional: true
        - name: emergency_contact_phone
          type: string
          optional: true
        - name: registration_date
          type: date
          optional: false
        - name: status
          type: string
          optional: false
        - name: notes
          type: string
          optional: true
  commands:
    - name: register_client
      description: Register a new client in the system
      events_emitted:
        - client_registered
      params:
        - name: first_name
          type: string
          optional: false
        - name: last_name
          type: string
          optional: false
        - name: email
          type: string
          optional: false
        - name: phone_number
          type: string
          optional: false
        - name: address
          type: string
          optional: true
