- name: notifications
  domain: communication_and_engagement
  description: Module for managing client notifications including appointment reminders, vaccination due alerts, and general communications.
  bounded_context: The notifications domain responsible for sending communications to clients through various channels. This module handles appointment reminders, vaccination due date alerts, promotional communications, and general notifications. It consumes events from other modules to trigger appropriate notifications and manages client communication preferences.
  responsibility: This module is responsible for sending notifications to clients via email, SMS, and push notifications. It manages notification templates, client communication preferences, and delivery tracking. It reacts to events from other modules to trigger timely and relevant communications.
  defaultQueries: true
  aggregates:
    - name: notification
      description: Represents a notification sent to a client
      fields:
        - name: notification_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: channel
          type: string
          optional: false
        - name: type
          type: string
          optional: false
        - name: subject
          type: string
          optional: true
        - name: body
          type: string
          optional: false
        - name: status
          type: string
          optional: false
        - name: sent_date
          type: datetime
          optional: true
        - name: created_date
          type: datetime
          optional: false
    - name: notification_preference
      description: Represents a client's notification preferences
      fields:
        - name: preference_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: email_enabled
          type: bool
          optional: false
        - name: sms_enabled
          type: bool
          optional: false
        - name: push_enabled
          type: bool
          optional: false
        - name: marketing_opt_in
          type: bool
          optional: false
  commands:
    - name: send_notification
      description: Send a notification to a client
      events_emitted:
        - notification_sent
      params:
        - name: client_id
          type: string
          optional: false
        - name: type
          type: string
          optional: false
        - name: subject
          type: string
          optional: true
        - name: body
          type: string
          optional: false
        - name: channel
          type: string
          optional: true
    - name: update_notification_preferences
      description: Update a client's notification preferences
      events_emitted:
