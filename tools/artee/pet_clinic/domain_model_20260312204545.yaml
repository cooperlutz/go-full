- name: client_and_pet_management
  domain: client_management
  description: Module for managing client accounts, pet profiles, and the relationships between clients and their pets.
  bounded_context: The client management domain responsible for maintaining client and pet information. This module manages the registration and profile maintenance of pet owners and their pets, including contact information, pet demographics, and the ownership relationships between clients and pets. It serves as the authoritative source for client and pet identity within the system.
  responsibility: This module is responsible for registering new clients and pets, maintaining their profile information, managing the ownership relationships between clients and pets, and providing client and pet identity data to other modules in the system.
  defaultQueries: true
  aggregates:
    - name: client
      description: Represents a pet owner who is a client of the clinic
      fields:
        - name: client_id
          type: string
          optional: false
        - name: first_name
          type: string
          optional: false
        - name: last_name
          type: string
          optional: false
        - name: email
          type: string
          optional: false
        - name: phone_number
          type: string
          optional: false
        - name: address
          type: string
          optional: true
        - name: pets
          type: list
          optional: true
        - name: registration_date
          type: datetime
          optional: false
        - name: status
          type: string
          optional: false
    - name: pet
      description: Represents a pet owned by a client
      fields:
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: species
          type: string
          optional: false
        - name: breed
          type: string
          optional: true
        - name: date_of_birth
          type: datetime
          optional: true
        - name: gender
          type: string
          optional: false
        - name: color
          type: string
          optional: true
        - name: microchip_number
          type: string
          optional: true
        - name: is_neutered
