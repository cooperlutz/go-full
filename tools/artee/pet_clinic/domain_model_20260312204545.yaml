      params:
        - name: client_id
          type: string
          optional: false
        - name: email_enabled
          type: bool
          optional: true
        - name: sms_enabled
          type: bool
          optional: true
        - name: push_enabled
          type: bool
          optional: true
        - name: marketing_opt_in
          type: bool
          optional: true
  events:
    - name: notification_sent
      description: Event triggered when a notification is sent
      kind: emitted
      fields:
        - name: notification_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: type
          type: string
          optional: false
        - name: channel
          type: string
          optional: false
    - name: notification_preferences_updated
      description: Event triggered when notification preferences are updated
      kind: emitted
      fields:
        - name: client_id
          type: string
          optional: false
    - name: appointment_scheduled
      description: Event consumed to send appointment confirmation notification
      kind: consumed
      fields:
