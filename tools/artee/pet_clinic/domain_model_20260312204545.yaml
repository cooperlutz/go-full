# Pet Clinic Domain Model

domain_model:
- name: veterinary_care
  subdomains:
  - name: clinical_services
    strategic_importance: core
  - name: appointment_management
    strategic_importance: core
  - name: medical_records
    strategic_importance: core
- name: client_management
  subdomains:
  - name: client_accounts
    strategic_importance: supporting
  - name: pet_profiles
    strategic_importance: supporting
  - name: loyalty_programs
    strategic_importance: supporting
- name: product_sales
  subdomains:
  - name: inventory_management
    strategic_importance: supporting
  - name: retail_storefront
    strategic_importance: supporting
  - name: online_store
    strategic_importance: supporting
- name: billing_and_payments
  subdomains:
  - name: invoicing
    strategic_importance: supporting
  - name: insurance_claims
    strategic_importance: supporting
- name: staff_management
  subdomains:
  - name: staff_scheduling
    strategic_importance: supporting
  - name: human_resources
    strategic_importance: generic
- name: communication_and_engagement
  subdomains:
  - name: notifications
    strategic_importance: generic
  - name: marketing
    strategic_importance: supporting
  - name: community_outreach
    strategic_importance: supporting
- name: identity_and_access
  subdomains:
  - name: user_accounts
    strategic_importance: generic
  - name: authentication_authorization
    strategic_importance: generic


modules:
- name: clinical_services
  domain: veterinary_care
  description: Module for managing veterinary clinical services including consultations, vaccinations, surgeries, and emergency care.
  bounded_context: The core clinical domain responsible for defining and delivering veterinary services. This module encapsulates the business logic around service types, treatment protocols, medical procedures, and clinical workflows. It is the primary value-generating capability of the Pet Clinic and represents the competitive differentiator through quality of care.
  responsibility: This module is responsible for managing the catalog of veterinary services, recording treatments and procedures performed on pets, tracking clinical outcomes, and orchestrating the clinical workflow from check-in through discharge. It defines the core medical business logic including treatment plans, prescriptions, and clinical notes.
  defaultQueries: true
  aggregates:
    - name: veterinary_service
      description: Represents a type of veterinary service offered by the clinic (e.g., routine check-up, vaccination, surgery, emergency care)
      fields:
        - name: service_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: description
          type: string
          optional: true
        - name: category
          type: string
          optional: false
        - name: base_price
          type: decimal
          optional: false
        - name: estimated_duration_minutes
          type: int32
          optional: true
        - name: requires_followup
          type: bool
          optional: true
    - name: treatment
      description: Represents an actual treatment or procedure performed on a pet during a visit
      fields:
        - name: treatment_id
          type: string
          optional: false
        - name: visit_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: diagnosis
          type: string
          optional: true
        - name: clinical_notes
          type: string
          optional: true
        - name: prescriptions
          type: list
          optional: true
        - name: treatment_date
          type: datetime
          optional: false
        - name: status
          type: string
          optional: false
    - name: prescription
      description: Represents a medication prescription issued during a treatment
      fields:
        - name: prescription_id
          type: string
          optional: false
        - name: treatment_id
          type: string
          optional: false
        - name: medication_name
          type: string
          optional: false
        - name: dosage
          type: string
          optional: false
        - name: frequency
          type: string
          optional: false
        - name: duration_days
          type: int32
          optional: false
        - name: instructions
          type: string
          optional: true
  commands:
    - name: record_treatment
      description: Record a treatment performed on a pet during a visit
      events_emitted:
        - treatment_recorded
      params:
        - name: visit_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: diagnosis
          type: string
          optional: true
        - name: clinical_notes
          type: string
          optional: true
    - name: issue_prescription
      description: Issue a prescription for a pet as part of a treatment
      events_emitted:
        - prescription_issued
      params:
        - name: treatment_id
          type: string
          optional: false
        - name: medication_name
          type: string
          optional: false
        - name: dosage
          type: string
          optional: false
        - name: frequency
          type: string
          optional: false
        - name: duration_days
          type: int32
          optional: false
        - name: instructions
          type: string
          optional: true
    - name: complete_treatment
      description: Mark a treatment as completed
      events_emitted:
        - treatment_completed
      params:
        - name: treatment_id
          type: string
          optional: false
        - name: outcome_notes
          type: string
          optional: true
    - name: create_veterinary_service
      description: Add a new veterinary service to the catalog
      events_emitted:
        - veterinary_service_created
      params:
        - name: name
          type: string
          optional: false
        - name: description
          type: string
          optional: true
        - name: category
          type: string
          optional: false
        - name: base_price
          type: decimal
          optional: false
        - name: estimated_duration_minutes
          type: int32
          optional: true
    - name: update_veterinary_service
      description: Update an existing veterinary service in the catalog
      events_emitted:
        - veterinary_service_updated
      params:
        - name: service_id
          type: string
          optional: false
        - name: name
          type: string
          optional: true
        - name: description
          type: string
          optional: true
        - name: base_price
          type: decimal
          optional: true
        - name: estimated_duration_minutes
          type: int32
          optional: true
  events:
    - name: treatment_recorded
      description: Event triggered when a treatment is recorded for a pet
      kind: emitted
      fields:
        - name: treatment_id
          type: string
          optional: false
        - name: visit_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: treatment_date
          type: datetime
          optional: false
    - name: treatment_completed
      description: Event triggered when a treatment is completed
      kind: emitted
      fields:
        - name: treatment_id
          type: string
          optional: false
        - name: visit_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: outcome_notes
          type: string
          optional: true
    - name: prescription_issued
      description: Event triggered when a prescription is issued
      kind: emitted
      fields:
        - name: prescription_id
          type: string
          optional: false
        - name: treatment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: medication_name
          type: string
          optional: false
    - name: veterinary_service_created
      description: Event triggered when a new veterinary service is added to the catalog
      kind: emitted
      fields:
        - name: service_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: category
          type: string
          optional: false
        - name: base_price
          type: decimal
          optional: false
    - name: veterinary_service_updated
      description: Event triggered when a veterinary service is updated
      kind: emitted
      fields:
        - name: service_id
          type: string
          optional: false
        - name: name
          type: string
          optional: true
        - name: base_price
          type: decimal
          optional: true
    - name: appointment_checked_in
      description: Event consumed when a pet checks in for an appointment, triggering clinical workflow
      kind: consumed
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
  queries:
    - name: find_treatments_by_pet
      description: Query to find all treatments for a specific pet
      params:
        - name: pet_id
          type: string
          optional: false
    - name: find_treatments_by_visit
      description: Query to find all treatments associated with a specific visit
      params:
        - name: visit_id
          type: string
          optional: false
    - name: find_services_by_category
      description: Query to find veterinary services by category
      params:
        - name: category
          type: string
          optional: false
    - name: find_prescriptions_by_pet
      description: Query to find all active prescriptions for a pet
      params:
        - name: pet_id
          type: string
          optional: false

- name: appointment_management
  domain: veterinary_care
  description: Module for managing appointment scheduling, rescheduling, cancellations, check-ins, and telemedicine sessions.
  bounded_context: The appointment scheduling domain responsible for coordinating when pets are seen by veterinarians. This module manages the lifecycle of appointments from booking through completion, including online scheduling, telemedicine sessions, and walk-in management. It serves as the primary coordination point between clients, pets, and veterinary staff availability.
  responsibility: This module is responsible for creating, updating, cancelling, and tracking appointments. It manages veterinarian availability and scheduling slots, handles online and in-person booking, supports telemedicine session management, and coordinates check-in and check-out workflows.
  defaultQueries: true
  aggregates:
    - name: appointment
      description: Represents a scheduled appointment for a pet at the clinic
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: appointment_type
          type: string
          optional: false
        - name: scheduled_date
          type: datetime
          optional: false
        - name: duration_minutes
          type: int32
          optional: false
        - name: status
          type: string
          optional: false
        - name: notes
          type: string
          optional: true
        - name: is_telemedicine
          type: bool
          optional: false
    - name: schedule_slot
      description: Represents an available time slot for a veterinarian
      fields:
        - name: slot_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: start_time
          type: datetime
          optional: false
        - name: end_time
          type: datetime
          optional: false
        - name: is_available
          type: bool
          optional: false
  commands:
    - name: schedule_appointment
      description: Schedule a new appointment for a pet
      events_emitted:
        - appointment_scheduled
      params:
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: scheduled_date
          type: datetime
          optional: false
        - name: is_telemedicine
          type: bool
          optional: false
        - name: notes
          type: string
          optional: true
    - name: reschedule_appointment
      description: Reschedule an existing appointment to a new date/time
      events_emitted:
        - appointment_rescheduled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: new_scheduled_date
          type: datetime
          optional: false
        - name: new_veterinarian_id
          type: string
          optional: true
    - name: cancel_appointment
      description: Cancel an existing appointment
      events_emitted:
        - appointment_cancelled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: cancellation_reason
          type: string
          optional: true
    - name: check_in_appointment
      description: Check in a pet for their scheduled appointment
      events_emitted:
        - appointment_checked_in
      params:
        - name: appointment_id
          type: string
          optional: false
    - name: complete_appointment
      description: Mark an appointment as completed
      events_emitted:
        - appointment_completed
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: completion_notes
          type: string
          optional: true
    - name: create_schedule_slot
      description: Create an available schedule slot for a veterinarian
      events_emitted:
        - schedule_slot_created
      params:
        - name: veterinarian_id
          type: string
          optional: false
        - name: start_time
          type: datetime
          optional: false
        - name: end_time
          type: datetime
          optional: false
  events:
    - name: appointment_scheduled
      description: Event triggered when a new appointment is scheduled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: scheduled_date
          type: datetime
          optional: false
        - name: is_telemedicine
          type: bool
          optional: false
    - name: appointment_rescheduled
      description: Event triggered when an appointment is rescheduled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: old_scheduled_date
          type: datetime
          optional: false
        - name: new_scheduled_date
          type: datetime
          optional: false
    - name: appointment_cancelled
      description: Event triggered when an appointment is cancelled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: cancellation_reason
          type: string
          optional: true
    - name: appointment_checked_in
      description: Event triggered when a pet checks in for an appointment
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
    - name: appointment_completed
      description: Event triggered when an appointment is completed
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
    - name: schedule_slot_created
      description: Event triggered when a new schedule slot is created
      kind: emitted
      fields:
        - name: slot_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: start_time
          type: datetime
          optional: false
        - name: end_time
          type: datetime
          optional: false
  queries:
    - name: find_appointments_by_client
      description: Query to find all appointments for a specific client
      params:
        - name: client_id
          type: string
          optional: false
    - name: find_appointments_by_pet
      description: Query to find all appointments for a specific pet
      params:
        - name: pet_id
          type: string
          optional: false
    - name: find_appointments_by_veterinarian
      description: Query to find all appointments for a specific veterinarian
      params:
        - name: veterinarian_id
          type: string
          optional: false
        - name: date
          type: datetime
          optional: true
    - name: find_available_slots
      description: Query to find available scheduling slots for a veterinarian on a given date
      params:
        - name: veterinarian_id
          type: string
          optional: true
        - name: date
          type: datetime
          optional: false
        - name: service_id
          type: string
          optional: true

- name: medical_records
  domain: veterinary_care
  description: Module for managing pet medical records, health history, vaccination records, and clinical documentation.
  bounded_context: The medical records domain responsible for maintaining the complete health history of pets. This module serves as the system of record for all clinical data including vaccination histories, lab results, weight tracking, allergies, and historical treatment summaries. It provides a longitudinal view of pet health across all visits.
  responsibility: This module is responsible for maintaining comprehensive medical records for each pet, including vaccination records, lab results, weight history, allergy information, and treatment history summaries. It ensures data integrity and provides historical health data to support clinical decision-making.
  defaultQueries: true
  aggregates:
    - name: medical_record
      description: Represents the complete medical record for a pet, serving as the aggregate root for all health-related data
      fields:
        - name: record_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: vaccination_records
          type: list
          optional: true
        - name: allergy_list
          type: list
          optional: true
        - name: weight_history
          type: list
          optional: true
        - name: created_date
          type: datetime
          optional: false
        - name: last_updated
          type: datetime
          optional: false
    - name: vaccination_record
      description: Represents a single vaccination administered to a pet
      fields:
        - name: vaccination_id
          type: string
          optional: false
        - name: record_id
          type: string
          optional: false
        - name: vaccine_name
          type: string
          optional: false
        - name: date_administered
          type: datetime
          optional: false
        - name: next_due_date
          type: datetime
          optional: true
        - name: administered_by
          type: string
          optional: false
        - name: batch_number
          type: string
          optional: true
    - name: lab_result
      description: Represents a lab test result for a pet
      fields:
        - name: lab_result_id
          type: string
          optional: false
        - name: record_id
          type: string
          optional: false
        - name: test_name
          type: string
          optional: false
        - name: test_date
          type: datetime
          optional: false
        - name: results
          type: string
          optional: false
        - name: normal_range
          type: string
          optional: true
        - name: notes
          type: string
          optional: true
  commands:
    - name: create_medical_record
      description: Create a new medical record for a pet
      events_emitted:
        - medical_record_created
      params:
        - name: pet_id
          type: string
          optional: false
    - name: add_vaccination_record
      description: Add a vaccination record to a pet's medical record
      events_emitted:
        - vaccination_recorded
      params:
        - name: record_id
          type: string
          optional: false
        - name: vaccine_name
          type: string
          optional: false
        - name: date_administered
          type: datetime
          optional: false
        - name: next_due_date
          type: datetime
          optional: true
        - name: administered_by
          type: string
          optional: false
        - name: batch_number
          type: string
          optional: true
    - name: add_lab_result
      description: Add a lab test result to a pet's medical record
      events_emitted:
        - lab_result_added
      params:
        - name: record_id
          type: string
          optional: false
        - name: test_name
          type: string
          optional: false
        - name: test_date
          type: datetime
          optional: false
        - name: results
          type: string
          optional: false
        - name: normal_range
          type: string
          optional: true
        - name: notes
          type: string
          optional: true
    - name: record_allergy
      description: Record an allergy for a pet
      events_emitted:
        - allergy_recorded
      params:
