- name: identity_and_access
  domain: identity_and_access
  description: Module for managing user authentication, authorization, and access control for the Pet Clinic system.
  bounded_context: The identity and access management domain responsible for user authentication and authorization. This module manages user accounts for clients and staff, handles login and session management, role-based access control, and security policies. It is a generic subdomain that can leverage standard identity management solutions.
  responsibility: This module is responsible for managing user accounts, authenticating users, authorizing access to system resources based on roles and permissions, and maintaining security policies. It provides identity verification services to all other modules in the system.
  defaultQueries: true
  aggregates:
    - name: user_account
      description: Represents a user account in the system
      fields:
        - name: user_id
          type: string
          optional: false
        - name: username
          type: string
          optional: false
        - name: email
          type: string
          optional: false
        - name: role
          type: string
          optional: false
        - name: associated_entity_id
          type: string
          optional: true
        - name: is_active
          type: bool
          optional: false
        - name: created_date
          type: datetime
          optional: false
        - name: last_login
          type: datetime
          optional: true
  commands:
    - name: create_user_account
      description: Create a new user account
      events_emitted:
        - user_account_created
      params:
