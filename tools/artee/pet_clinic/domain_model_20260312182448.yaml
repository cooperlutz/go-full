- name: telemedicine
  domain: veterinary_care
  description: Module for managing telemedicine consultations and virtual veterinary visits.
  bounded_context: Responsible for managing virtual consultations between veterinarians and pet owners. This module handles telemedicine session scheduling, video call management, virtual consultation notes, and follow-up recommendations. It extends the clinic's reach beyond physical visits.
  responsibility: Managing telemedicine sessions, virtual consultation workflows, session recordings and notes, and follow-up actions from virtual visits.
  defaultQueries: true
  aggregates:
    - name: telemedicine_session
      description: Represents a telemedicine consultation session
      fields:
        - name: session_id
          type: string
          optional: false
        - name: appointment_id
          type: string
          optional: true
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: scheduled_time
          type: datetime
          optional: false
        - name: start_time
          type: datetime
          optional: true
        - name: end_time
          type: datetime
          optional: true
        - name: status
          type: string
          optional: false
        - name: consultation_notes
          type: string
          optional: true
        - name: follow_up_required
          type: bool
          optional: false
        - name: session_link
          type: string
          optional: true
  commands:
    - name: create_telemedicine_session
      description: Create a new telemedicine session
      events_emitted:
        - telemedicine_session_created
      params:
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
