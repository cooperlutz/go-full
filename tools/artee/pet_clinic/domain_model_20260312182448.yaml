modules:
- name: clinical_services
  domain: veterinary_care
  description: Module for managing veterinary clinical services including routine check-ups, vaccinations, surgeries, and emergency care.
  bounded_context: The core clinical domain responsible for defining, delivering, and tracking veterinary services performed on pets. This module encapsulates the business logic around service types, treatment plans, procedures, prescriptions, and clinical outcomes. It is the primary value-generating capability of the pet clinic.
  responsibility: Managing the catalog of veterinary services, recording treatments and procedures performed on pets, tracking prescriptions and medications, and managing clinical workflows from examination through treatment completion.
  defaultQueries: true
  aggregates:
    - name: veterinary_service
      description: Represents a type of veterinary service offered by the clinic
      fields:
        - name: service_id
          type: string
          optional: false
        - name: name
          type: string
          optional: false
        - name: description
          type: string
          optional: true
        - name: category
          type: string
          optional: false
        - name: base_price
          type: decimal
          optional: false
        - name: duration_minutes
          type: int32
          optional: true
        - name: is_active
          type: bool
          optional: false
    - name: treatment
      description: Represents a treatment or procedure performed on a pet during a visit
      fields:
        - name: treatment_id
          type: string
          optional: false
        - name: visit_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: false
        - name: diagnosis
          type: string
          optional: true
        - name: notes
          type: string
          optional: true
        - name: status
          type: string
          optional: false
        - name: performed_at
          type: datetime
          optional: false
        - name: prescriptions
          type: list
          optional: true
    - name: prescription
      description: Represents a medication prescription issued during a treatment
      fields:
        - name: prescription_id
          type: string
          optional: false
        - name: treatment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: medication_name
          type: string
          optional: false
        - name: dosage
          type: string
          optional: false
        - name: frequency
          type: string
          optional: false
        - name: duration_days
          type: int32
          optional: false
        - name: prescribed_by
          type: string
          optional: false
        - name: prescribed_at
          type: datetime
          optional: false
        - name: notes
          type: string
          optional: true
    - name: visit
      description: Represents a pet visit to the clinic encompassing one or more treatments
      fields:
        - name: visit_id
          type: string
          optional: false
        - name: appointment_id
          type: string
          optional: true
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: visit_type
          type: string
          optional: false
        - name: status
          type: string
          optional: false
        - name: check_in_time
          type: datetime
          optional: false
        - name: check_out_time
          type: datetime
          optional: true
        - name: reason_for_visit
          type: string
          optional: true
        - name: treatments
          type: list
          optional: true
  commands:
    - name: check_in_pet
      description: Check in a pet for a clinic visit
      events_emitted:
        - pet_checked_in
      params:
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: appointment_id
          type: string
          optional: true
        - name: visit_type
          type: string
          optional: false
        - name: reason_for_visit
          type: string
          optional: true
    - name: record_treatment
      description: Record a treatment or procedure performed on a pet
      events_emitted:
        - treatment_recorded
      params:
