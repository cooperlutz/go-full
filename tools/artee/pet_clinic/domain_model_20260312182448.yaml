- name: appointment_management
  domain: veterinary_care
  description: Module for managing appointment scheduling, rescheduling, and cancellations for veterinary visits.
  bounded_context: Responsible for the full lifecycle of appointments from scheduling through completion or cancellation. This module handles availability management, time slot allocation, appointment reminders, and coordination between clients and veterinarians. It supports both online and in-person scheduling channels.
  responsibility: Managing appointment creation, scheduling, rescheduling, cancellation, and reminder workflows. Tracking veterinarian availability and time slot allocation. Providing online scheduling capabilities for clients.
  defaultQueries: true
  aggregates:
    - name: appointment
      description: Represents a scheduled appointment for a pet at the clinic
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: true
        - name: scheduled_date
          type: datetime
          optional: false
        - name: duration_minutes
          type: int32
          optional: false
        - name: status
          type: string
          optional: false
        - name: reason
          type: string
          optional: true
        - name: channel
          type: string
          optional: false
        - name: notes
          type: string
          optional: true
    - name: availability_slot
      description: Represents an available time slot for a veterinarian
      fields:
        - name: slot_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: start_time
          type: datetime
          optional: false
        - name: end_time
          type: datetime
          optional: false
        - name: is_available
          type: bool
          optional: false
  commands:
    - name: schedule_appointment
      description: Schedule a new appointment for a pet
      events_emitted:
        - appointment_scheduled
      params:
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: service_id
          type: string
          optional: true
        - name: scheduled_date
          type: datetime
          optional: false
        - name: duration_minutes
          type: int32
          optional: false
        - name: reason
          type: string
          optional: true
        - name: channel
          type: string
          optional: false
    - name: reschedule_appointment
      description: Reschedule an existing appointment to a new date/time
      events_emitted:
        - appointment_rescheduled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: new_scheduled_date
          type: datetime
          optional: false
        - name: new_veterinarian_id
          type: string
          optional: true
    - name: cancel_appointment
      description: Cancel an existing appointment
      events_emitted:
        - appointment_cancelled
      params:
        - name: appointment_id
          type: string
          optional: false
        - name: cancellation_reason
          type: string
          optional: true
    - name: confirm_appointment
      description: Confirm an appointment
      events_emitted:
        - appointment_confirmed
      params:
        - name: appointment_id
          type: string
          optional: false
    - name: set_veterinarian_availability
      description: Set availability slots for a veterinarian
      events_emitted:
        - availability_updated
      params:
        - name: veterinarian_id
          type: string
          optional: false
        - name: start_time
          type: datetime
          optional: false
        - name: end_time
          type: datetime
          optional: false
  events:
    - name: appointment_scheduled
      description: Event triggered when a new appointment is scheduled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: scheduled_date
          type: datetime
          optional: false
    - name: appointment_rescheduled
      description: Event triggered when an appointment is rescheduled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: new_scheduled_date
          type: datetime
          optional: false
        - name: previous_scheduled_date
          type: datetime
          optional: false
    - name: appointment_cancelled
      description: Event triggered when an appointment is cancelled
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: cancellation_reason
          type: string
          optional: true
    - name: appointment_confirmed
      description: Event triggered when an appointment is confirmed
      kind: emitted
      fields:
        - name: appointment_id
          type: string
          optional: false
        - name: pet_id
          type: string
          optional: false
        - name: client_id
          type: string
          optional: false
        - name: veterinarian_id
          type: string
          optional: false
        - name: scheduled_date
