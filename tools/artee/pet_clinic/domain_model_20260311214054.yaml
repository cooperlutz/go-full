            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: surgery_type
            type: string
            optional: false
          - name: scheduled_date
            type: timestamp
            optional: false
          - name: pre_op_notes
            type: string
            optional: true
      - name: complete_surgery
        description: Record the completion of a surgical procedure
        events_emitted:
          - surgery_completed
        params:
          - name: surgery_id
            type: string
            optional: false
          - name: post_op_notes
            type: string
            optional: true
          - name: complications
            type: string
            optional: true
      - name: update_allergies
        description: Update the allergy list for a pet's medical record
        events_emitted:
          - allergies_updated
        params:
          - name: medical_record_id
            type: string
            optional: false
          - name: allergies
            type: "[]string"
            optional: false
    events:
      - name: medical_record_created
        description: Event triggered when a new medical record is created
        kind: emitted
        fields:
          - name: medical_record_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
      - name: visit_recorded
        description: Event triggered when a clinical visit is recorded
        kind: emitted
        fields:
          - name: visit_record_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: diagnosis
            type: string
            optional: true
      - name: vaccination_administered
        description: Event triggered when a vaccination is administered
        kind: emitted
        fields:
          - name: vaccination_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
      - name: prescription_issued
        description: Event triggered when a prescription is issued
        kind: emitted
        fields:
          - name: prescription_id
            type: string
            optional: false
          - name: visit_record_id
            type: string
            optional: false
          - name: medication_name
            type: string
            optional: false
      - name: surgery_scheduled
        description: Event triggered when a surgery is scheduled
        kind: emitted
        fields:
          - name: surgery_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: surgery_type
            type: string
            optional: false
          - name: scheduled_date
            type: timestamp
            optional: false
      - name: surgery_completed
        description: Event triggered when a surgery is completed
        kind: emitted
        fields:
          - name: surgery_id
            type: string
            optional: false
      - name: allergies_updated
        description: Event triggered when a pet's allergies are updated
        kind: emitted
        fields:
          - name: medical_record_id
            type: string
            optional: false
          - name: allergies
            type: "[]string"
            optional: false
      - name: pet_registered
        description: Consumed event when a new pet is registered to create a medical record
        kind: consumed
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: client_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
      - name: appointment_completed
        description: Consumed event when an appointment is completed to prompt visit recording
        kind: consumed
        fields:
          - name: appointment_id
            type: string
            optional: false
    queries:
      - name: find_medical_record_by_pet
        description: Find the medical record for a specific pet
        params:
          - name: pet_id
            type: string
            optional: false
      - name: find_visit_records_by_pet
        description: Find all visit records for a specific pet
        params:
          - name: pet_id
            type: string
            optional: false
      - name: find_vaccinations_by_pet
        description: Find all vaccinations for a specific pet
        params:
          - name: pet_id
            type: string
            optional: false
      - name: find_upcoming_vaccination_reminders
        description: Find pets with vaccinations expiring soon
        params:
          - name: days_until_expiration
            type: int32
            optional: false
      - name: find_surgeries_by_veterinarian
        description: Find all surgeries assigned to a specific veterinarian
        params:
          - name: veterinarian_id
            type: string
            optional: false
          - name: status
            type: string
            optional: true

  - name: staff_management
    description: Module for managing veterinarians and support staff
    bounded_context: Responsible for managing the clinic's workforce including veterinarians, technicians, and support staff. This includes staff profiles, specializations, credentials, and roles within the clinic.
    responsibility: This module manages staff information, credentials, specializations, and roles. It serves as the authoritative source for staff identity and capabilities referenced by other modules such as appointment scheduling and veterinary care.
    defaultQueries: true
    aggregates:
      - name: staff_member
        description: Represents a staff member at the clinic
        fields:
          - name: staff_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: role
            type: string
            optional: false
          - name: specializations
            type: "[]string"
            optional: true
          - name: license_number
            type: string
            optional: true
          - name: hire_date
            type: timestamp
            optional: false
          - name: is_active
            type: bool
            optional: false
    commands:
      - name: register_staff_member
        description: Register a new staff member
        events_emitted:
          - staff_member_registered
        params:
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: role
            type: string
            optional: false
          - name: specializations
            type: "[]string"
            optional: true
          - name: license_number
            type: string
            optional: true
          - name: hire_date
            type: timestamp
            optional: false
      - name: update_staff_profile
        description: Update a staff member's profile information
        events_emitted:
          - staff_profile_updated
        params:
          - name: staff_id
            type: string
            optional: false
          - name: email
            type: string
            optional: true
          - name: phone_number
            type: string
            optional: true
          - name: specializations
            type: "[]string"
            optional: true
      - name: deactivate_staff_member
        description: Deactivate a staff member
        events_emitted:
          - staff_member_deactivated
        params:
          - name: staff_id
            type: string
            optional: false
    events:
      - name: staff_member_registered
        description: Event triggered when a new staff member is registered
        kind: emitted
        fields:
          - name: staff_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: role
            type: string
            optional: false
      - name: staff_profile_updated
        description: Event triggered when a staff member's profile is updated
        kind: emitted
        fields:
          - name: staff_id
            type: string
            optional: false
      - name: staff_member_deactivated
