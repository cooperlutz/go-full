  - name: billing
    description: Module for managing invoicing, payments, and financial transactions
    bounded_context: Responsible for managing the financial aspects of the clinic including invoice generation, payment processing, discounts, loyalty program pricing, and insurance claim support. This module tracks all financial transactions related to veterinary services and product sales.
    responsibility: This module manages invoices, payments, refunds, and financial reporting. It handles pricing for services and products, applies loyalty discounts, and supports pet insurance claim generation.
    defaultQueries: true
    aggregates:
      - name: invoice
        description: Represents an invoice for services rendered or products sold
        fields:
          - name: invoice_id
            type: string
            optional: false
