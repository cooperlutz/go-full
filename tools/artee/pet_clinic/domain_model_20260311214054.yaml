modules:
  - name: client_management
    description: Module for managing pet owners (clients) and their pets
    bounded_context: Responsible for managing the lifecycle of clients and their pets. This includes client registration, pet profiles, contact information, and the relationship between owners and their animals. It serves as the identity and profile hub for all customer-facing operations.
    responsibility: This module manages client and pet information, including registration, profile updates, pet medical history references, and contact preferences. It is the authoritative source for client and pet identity within the system.
    defaultQueries: true
    aggregates:
      - name: client
        description: Represents a pet owner who is a client of the clinic
        fields:
          - name: client_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: address
            type: string
            optional: true
          - name: loyalty_member
            type: bool
            optional: false
          - name: pets
            type: "[]pet"
            optional: true
      - name: pet
        description: Represents a pet belonging to a client
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: client_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
          - name: breed
            type: string
            optional: true
          - name: date_of_birth
            type: timestamp
            optional: true
          - name: weight
            type: float64
            optional: true
          - name: gender
            type: string
            optional: true
          - name: microchip_id
            type: string
            optional: true
    commands:
      - name: register_client
        description: Register a new client in the system
        events_emitted:
          - client_registered
        params:
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
          - name: phone_number
            type: string
            optional: false
          - name: address
            type: string
            optional: true
      - name: update_client_contact
        description: Update a client's contact information
        events_emitted:
          - client_contact_updated
        params:
          - name: client_id
            type: string
            optional: false
          - name: email
            type: string
            optional: true
          - name: phone_number
            type: string
            optional: true
          - name: address
            type: string
            optional: true
      - name: register_pet
        description: Register a new pet for an existing client
        events_emitted:
          - pet_registered
        params:
          - name: client_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
          - name: breed
            type: string
            optional: true
          - name: date_of_birth
            type: timestamp
            optional: true
          - name: weight
            type: float64
            optional: true
          - name: gender
            type: string
            optional: true
          - name: microchip_id
            type: string
            optional: true
      - name: update_pet_profile
        description: Update a pet's profile information
        events_emitted:
          - pet_profile_updated
        params:
          - name: pet_id
            type: string
            optional: false
          - name: name
            type: string
            optional: true
          - name: weight
            type: float64
            optional: true
          - name: microchip_id
            type: string
            optional: true
      - name: enroll_in_loyalty_program
        description: Enroll a client in the loyalty program
        events_emitted:
          - client_enrolled_in_loyalty
        params:
          - name: client_id
            type: string
            optional: false
    events:
      - name: client_registered
        description: Event triggered when a new client is registered
        kind: emitted
        fields:
          - name: client_id
            type: string
            optional: false
          - name: first_name
            type: string
            optional: false
          - name: last_name
            type: string
            optional: false
          - name: email
            type: string
            optional: false
      - name: client_contact_updated
        description: Event triggered when a client's contact information is updated
        kind: emitted
        fields:
          - name: client_id
            type: string
            optional: false
          - name: email
            type: string
            optional: true
          - name: phone_number
            type: string
            optional: true
          - name: address
            type: string
            optional: true
      - name: pet_registered
        description: Event triggered when a new pet is registered
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
          - name: client_id
            type: string
            optional: false
          - name: name
            type: string
            optional: false
          - name: species
            type: string
            optional: false
      - name: pet_profile_updated
        description: Event triggered when a pet's profile is updated
        kind: emitted
        fields:
          - name: pet_id
            type: string
            optional: false
      - name: client_enrolled_in_loyalty
        description: Event triggered when a client enrolls in the loyalty program
        kind: emitted
        fields:
          - name: client_id
            type: string
            optional: false
    queries:
      - name: find_clients_by_last_name
        description: Search for clients by last name
        params:
          - name: last_name
            type: string
            optional: false
      - name: find_pets_by_client
        description: Find all pets belonging to a specific client
        params:
          - name: client_id
            type: string
            optional: false
      - name: find_loyalty_members
        description: Find all clients enrolled in the loyalty program
        params: []

  - name: appointment_scheduling
    description: Module for managing appointment scheduling and telemedicine sessions
    bounded_context: Responsible for the scheduling, rescheduling, and cancellation of appointments. This includes both in-person clinic visits and telemedicine sessions. It manages appointment slots, veterinarian availability, and appointment lifecycle.
    responsibility: This module handles all aspects of appointment management including creating, confirming, rescheduling, cancelling, and completing appointments. It coordinates veterinarian availability with client requests and supports both in-person and telemedicine appointment types.
    defaultQueries: true
    aggregates:
      - name: appointment
        description: Represents a scheduled appointment at the clinic or via telemedicine
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: client_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: scheduled_at
            type: timestamp
            optional: false
          - name: duration_minutes
            type: int32
            optional: false
          - name: appointment_type
            type: string
            optional: false
          - name: channel
            type: string
            optional: false
          - name: status
            type: string
            optional: false
          - name: reason
            type: string
            optional: true
          - name: notes
            type: string
            optional: true
      - name: veterinarian_schedule
        description: Represents a veterinarian's availability schedule
        fields:
          - name: veterinarian_id
            type: string
            optional: false
          - name: date
            type: timestamp
            optional: false
          - name: available_slots
            type: "[]time_slot"
            optional: true
      - name: time_slot
        description: Represents an available time slot for scheduling
        fields:
          - name: start_time
            type: timestamp
            optional: false
          - name: end_time
            type: timestamp
            optional: false
          - name: is_available
            type: bool
            optional: false
    commands:
      - name: schedule_appointment
        description: Schedule a new appointment for a pet
        events_emitted:
          - appointment_scheduled
        params:
          - name: client_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: scheduled_at
            type: timestamp
            optional: false
          - name: duration_minutes
            type: int32
            optional: false
          - name: appointment_type
            type: string
            optional: false
          - name: channel
            type: string
            optional: false
          - name: reason
            type: string
            optional: true
      - name: confirm_appointment
        description: Confirm a pending appointment
        events_emitted:
          - appointment_confirmed
        params:
          - name: appointment_id
            type: string
            optional: false
      - name: reschedule_appointment
        description: Reschedule an existing appointment to a new time
        events_emitted:
          - appointment_rescheduled
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: new_scheduled_at
            type: timestamp
            optional: false
          - name: new_veterinarian_id
            type: string
            optional: true
      - name: cancel_appointment
        description: Cancel an existing appointment
        events_emitted:
          - appointment_cancelled
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: cancellation_reason
            type: string
            optional: true
      - name: complete_appointment
        description: Mark an appointment as completed
        events_emitted:
          - appointment_completed
        params:
          - name: appointment_id
            type: string
            optional: false
          - name: notes
            type: string
            optional: true
      - name: set_veterinarian_availability
        description: Set or update a veterinarian's availability schedule
        events_emitted:
          - veterinarian_availability_updated
        params:
          - name: veterinarian_id
            type: string
            optional: false
          - name: date
            type: timestamp
            optional: false
          - name: available_slots
            type: "[]time_slot"
            optional: false
    events:
      - name: appointment_scheduled
        description: Event triggered when a new appointment is scheduled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: client_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: scheduled_at
            type: timestamp
            optional: false
          - name: appointment_type
            type: string
            optional: false
          - name: channel
            type: string
            optional: false
      - name: appointment_confirmed
        description: Event triggered when an appointment is confirmed
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
      - name: appointment_rescheduled
        description: Event triggered when an appointment is rescheduled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: new_scheduled_at
            type: timestamp
            optional: false
      - name: appointment_cancelled
        description: Event triggered when an appointment is cancelled
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
          - name: cancellation_reason
            type: string
            optional: true
      - name: appointment_completed
        description: Event triggered when an appointment is completed
        kind: emitted
        fields:
          - name: appointment_id
            type: string
            optional: false
      - name: veterinarian_availability_updated
        description: Event triggered when a veterinarian's availability is updated
        kind: emitted
        fields:
          - name: veterinarian_id
            type: string
            optional: false
          - name: date
            type: timestamp
            optional: false
    queries:
      - name: find_appointments_by_client
        description: Find all appointments for a specific client
        params:
          - name: client_id
            type: string
            optional: false
      - name: find_appointments_by_veterinarian
        description: Find all appointments for a specific veterinarian
        params:
          - name: veterinarian_id
            type: string
            optional: false
          - name: date
            type: timestamp
            optional: true
      - name: find_available_slots
        description: Find available appointment slots for a given date and veterinarian
        params:
          - name: veterinarian_id
            type: string
            optional: true
          - name: date
            type: timestamp
            optional: false
          - name: appointment_type
            type: string
            optional: true
      - name: find_appointments_by_pet
        description: Find all appointments for a specific pet
        params:
          - name: pet_id
            type: string
            optional: false

  - name: veterinary_care
    description: Module for managing veterinary medical services and clinical records
    bounded_context: The core clinical domain responsible for managing medical records, diagnoses, treatments, vaccinations, surgeries, and prescriptions. This module captures the medical history and clinical workflows that are central to the veterinary practice.
    responsibility: This module manages all clinical and medical aspects of veterinary care including medical records, visit notes, diagnoses, treatment plans, vaccinations, surgical procedures, and prescriptions. It is the authoritative source for pet health information.
    defaultQueries: true
    aggregates:
      - name: medical_record
        description: Represents the complete medical record for a pet
        fields:
          - name: medical_record_id
            type: string
            optional: false
          - name: pet_id
            type: string
            optional: false
          - name: created_at
            type: timestamp
            optional: false
          - name: visit_records
            type: "[]visit_record"
            optional: true
          - name: vaccinations
            type: "[]vaccination"
            optional: true
          - name: allergies
            type: "[]string"
            optional: true
          - name: chronic_conditions
            type: "[]string"
            optional: true
      - name: visit_record
        description: Represents a single clinical visit record
        fields:
          - name: visit_record_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: appointment_id
            type: string
            optional: true
          - name: veterinarian_id
            type: string
            optional: false
          - name: visit_date
            type: timestamp
            optional: false
          - name: chief_complaint
            type: string
            optional: true
          - name: diagnosis
            type: string
            optional: true
          - name: treatment_notes
            type: string
            optional: true
          - name: prescriptions
            type: "[]prescription"
            optional: true
          - name: follow_up_required
            type: bool
            optional: false
          - name: follow_up_date
            type: timestamp
            optional: true
      - name: vaccination
        description: Represents a vaccination administered to a pet
        fields:
          - name: vaccination_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: administered_date
            type: timestamp
            optional: false
          - name: expiration_date
            type: timestamp
            optional: true
          - name: veterinarian_id
            type: string
            optional: false
          - name: batch_number
            type: string
            optional: true
      - name: prescription
        description: Represents a prescription issued for a pet
        fields:
          - name: prescription_id
            type: string
            optional: false
          - name: visit_record_id
            type: string
            optional: false
          - name: medication_name
            type: string
            optional: false
          - name: dosage
            type: string
            optional: false
          - name: frequency
            type: string
            optional: false
          - name: duration_days
            type: int32
            optional: false
          - name: instructions
            type: string
            optional: true
          - name: status
            type: string
            optional: false
      - name: surgery
        description: Represents a surgical procedure performed on a pet
        fields:
          - name: surgery_id
            type: string
            optional: false
          - name: medical_record_id
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: surgery_type
            type: string
            optional: false
          - name: scheduled_date
            type: timestamp
            optional: false
          - name: status
            type: string
            optional: false
          - name: pre_op_notes
            type: string
            optional: true
          - name: post_op_notes
            type: string
            optional: true
          - name: complications
            type: string
            optional: true
    commands:
      - name: create_medical_record
        description: Create a new medical record for a pet
        events_emitted:
          - medical_record_created
        params:
          - name: pet_id
            type: string
            optional: false
      - name: record_visit
        description: Record a clinical visit for a pet
        events_emitted:
          - visit_recorded
        params:
          - name: medical_record_id
            type: string
            optional: false
          - name: appointment_id
            type: string
            optional: true
          - name: veterinarian_id
            type: string
            optional: false
          - name: chief_complaint
            type: string
            optional: true
          - name: diagnosis
            type: string
            optional: true
          - name: treatment_notes
            type: string
            optional: true
          - name: follow_up_required
            type: bool
            optional: false
          - name: follow_up_date
            type: timestamp
            optional: true
      - name: administer_vaccination
        description: Record a vaccination administered to a pet
        events_emitted:
          - vaccination_administered
        params:
          - name: medical_record_id
            type: string
            optional: false
          - name: vaccine_name
            type: string
            optional: false
          - name: veterinarian_id
            type: string
            optional: false
          - name: batch_number
            type: string
            optional: true
