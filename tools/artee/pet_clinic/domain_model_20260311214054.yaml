            optional: false
          - name: tax_amount
            type: float64
            optional: false
          - name: total_amount
            type: float64
            optional: false
          - name: notes
            type: string
            optional: true
      - name: line_item
        description: Represents a line item on an invoice
        fields:
          - name: line_item_id
            type: string
            optional: false
