# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax

# Continuous Integration (CI) workflow for Pull Requests (PRs) and pushes to main branch.
name: Build

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  ci:
    name: Lint, Format, Unit Test, Build, Coverage, Release Snapshot
    runs-on: ubuntu-latest
    steps:

      - name: Setup / Check out code into the Go module directory
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup / pnpm for frontend build
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10
          run_install: false

      - name: Setup / Install frontend dependencies
        run: pnpm install
        working-directory: ./api/frontend

      - name: Setup / Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.1

      - name: Run / Make CI
        run: make ci

      # Verify that version bump and changelog generation would succeed
      - name: Run / Bump version & generate changelog
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # v0.27.1
        with:
          push: false
          dry_run: true

      - name: Test / Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        # Skip Codecov for Dependabot PRs
        if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
        with:
          fail_ci_if_error: true
          files: .coverage/coverage.filtered.out, api/frontend/coverage/coverage-final.json
          slug: cooperlutz/go-full
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run / GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run / End to End Tests
        run: make compose-e2e

      - name: Publish / Upload dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: dist
          retention-days: 1