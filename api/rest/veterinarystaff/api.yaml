openapi: "3.0.0"
info:
  version: 1.0.0
  title: VeterinaryStaff API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/veterinarians:
    get:
      operationId: findAllVeterinarians
      responses:
        '200':
          description: A list of Veterinarians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Veterinarian'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/veterinarians/{veterinarianId}:
    get:
      operationId: findOneVeterinarian
      parameters:
        - name: veterinarianId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Veterinarian details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Veterinarian'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/staffmembers:
    get:
      operationId: findAllStaffMembers
      responses:
        '200':
          description: A list of StaffMembers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffMember'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/staffmembers/{staffMemberId}:
    get:
      operationId: findOneStaffMember
      parameters:
        - name: staffMemberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: StaffMember details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/availabilityschedules:
    get:
      operationId: findAllAvailabilitySchedules
      responses:
        '200':
          description: A list of AvailabilitySchedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilitySchedule'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/availabilityschedules/{availabilityScheduleId}:
    get:
      operationId: findOneAvailabilitySchedule
      parameters:
        - name: availabilityScheduleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AvailabilitySchedule details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilitySchedule'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

