components:
  schemas:
    
    Veterinarian:
      type: object
      description: Represents a veterinarian employed at the clinic
      properties:
        
        veterinarian_id:
          type: string
        
        first_name:
          type: string
        
        last_name:
          type: string
        
        email:
          type: string
        
        phone_number:
          type: string
        
        license_number:
          type: string
        
        specializations:
          type: string
        
        status:
          type: string
        
    
    StaffMember:
      type: object
      description: Represents a support staff member at the clinic
      properties:
        
        staff_id:
          type: string
        
        first_name:
          type: string
        
        last_name:
          type: string
        
        email:
          type: string
        
        role:
          type: string
        
        status:
          type: string
        
    
    AvailabilitySchedule:
      type: object
      description: Represents the availability schedule for a veterinarian or staff member
      properties:
        
        schedule_id:
          type: string
        
        staff_id:
          type: string
        
        day_of_week:
          type: string
        
        start_time:
          type: string
        
        end_time:
          type: string
        
        is_available:
          type: boolean
        
    


    OnboardVeterinarian:
      type: object
      properties:
        
        firstName:
          type: string
        
        lastName:
          type: string
        
        email:
          type: string
        
        phoneNumber:
          type: string
        
        licenseNumber:
          type: string
        
        specializations:
          type: string
        

    UpdateVeterinarianProfile:
      type: object
      properties:
        
        veterinarianId:
          type: string
        
        specializations:
          type: string
        
        phoneNumber:
          type: string
        
        email:
          type: string
        

    SetStaffAvailability:
      type: object
      properties:
        
        staffId:
          type: string
        
        dayOfWeek:
          type: string
        
        startTime:
          type: string
        
        endTime:
          type: string
        
        isAvailable:
          type: boolean
        

    DeactivateStaffMember:
      type: object
      properties:
        
        staffId:
          type: string
        
        reason:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string