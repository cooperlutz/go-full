openapi: "3.0.0"
info:
  version: 1.0.0
  title: StartupIdeaRater API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/startuppitchs:
    get:
      operationId: findAllStartupPitchs
      responses:
        '200':
          description: A list of StartupPitchs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StartupPitch'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/startuppitchs/{startupPitchId}:
    get:
      operationId: findOneStartupPitch
      parameters:
        - name: startupPitchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: StartupPitch details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartupPitch'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

