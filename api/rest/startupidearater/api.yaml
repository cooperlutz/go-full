components:
  schemas:
    
    StartupPitch:
      type: object
      description: Represents a startup pitch to be rated
      properties:
        
        pitchContent:
          type: string
        
        score:
          type: integer
          format: int32
        
        critique:
          type: string
        
    

    


    RateStartupIdea:
      type: object
      properties:
        
        pitchContent:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string