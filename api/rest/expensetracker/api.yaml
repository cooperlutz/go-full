components:
  schemas:
    
    Expense:
      type: object
      description: Represents a submitted business expense
      properties:
        
        description:
          type: string
        
        amount:
          type: number
          format: double
        
        category:
          type: string
        
    

    


    SubmitExpense:
      type: object
      properties:
        
        description:
          type: string
        
        amount:
          type: number
          format: double
        
        category:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string