openapi: "3.0.0"
info:
  version: 1.0.0
  title: InsuranceAndClaims API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/insuranceproviders:
    get:
      operationId: findAllInsuranceProviders
      responses:
        '200':
          description: A list of InsuranceProviders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InsuranceProvider'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/insuranceproviders/{insuranceProviderId}:
    get:
      operationId: findOneInsuranceProvider
      parameters:
        - name: insuranceProviderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: InsuranceProvider details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceProvider'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/insuranceclaims:
    get:
      operationId: findAllInsuranceClaims
      responses:
        '200':
          description: A list of InsuranceClaims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InsuranceClaim'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/insuranceclaims/{insuranceClaimId}:
    get:
      operationId: findOneInsuranceClaim
      parameters:
        - name: insuranceClaimId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: InsuranceClaim details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceClaim'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

