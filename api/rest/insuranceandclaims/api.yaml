components:
  schemas:
    
    InsuranceProvider:
      type: object
      description: Represents a pet insurance company partnered with the clinic
      properties:
        
        provider_id:
          type: string
        
        name:
          type: string
        
        contact_name:
          type: string
        
        email:
          type: string
        
        phone_number:
          type: string
        
        claim_submission_url:
          type: string
        
        status:
          type: string
        
    
    InsuranceClaim:
      type: object
      description: Represents an insurance claim submitted for a pet's veterinary services
      properties:
        
        claim_id:
          type: string
        
        owner_id:
          type: string
        
        pet_id:
          type: string
        
        provider_id:
          type: string
        
        invoice_id:
          type: string
        
        policy_number:
          type: string
        
        claim_amount:
          type: number
          format: float
        
        approved_amount:
          type: number
          format: float
        
        submission_date:
          type: string
        
        resolution_date:
          type: string
        
        status:
          type: string
        
        notes:
          type: string
        
    


    RegisterInsuranceProvider:
      type: object
      properties:
        
        name:
          type: string
        
        contactName:
          type: string
        
        email:
          type: string
        
        phoneNumber:
          type: string
        
        claimSubmissionUrl:
          type: string
        

    SubmitInsuranceClaim:
      type: object
      properties:
        
        ownerId:
          type: string
        
        petId:
          type: string
        
        providerId:
          type: string
        
        invoiceId:
          type: string
        
        policyNumber:
          type: string
        
        claimAmount:
          type: number
          format: float
        

    ApproveInsuranceClaim:
      type: object
      properties:
        
        claimId:
          type: string
        
        approvedAmount:
          type: number
          format: float
        
        resolutionDate:
          type: string
        

    RejectInsuranceClaim:
      type: object
      properties:
        
        claimId:
          type: string
        
        reason:
          type: string
        
        resolutionDate:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string