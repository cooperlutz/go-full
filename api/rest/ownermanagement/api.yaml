openapi: "3.0.0"
info:
  version: 1.0.0
  title: OwnerManagement API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/owners:
    get:
      operationId: findAllOwners
      responses:
        '200':
          description: A list of Owners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Owner'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/owners/{ownerId}:
    get:
      operationId: findOneOwner
      parameters:
        - name: ownerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Owner details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/loyaltyaccounts:
    get:
      operationId: findAllLoyaltyAccounts
      responses:
        '200':
          description: A list of LoyaltyAccounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoyaltyAccount'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/loyaltyaccounts/{loyaltyAccountId}:
    get:
      operationId: findOneLoyaltyAccount
      parameters:
        - name: loyaltyAccountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: LoyaltyAccount details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAccount'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

