components:
  schemas:
    
    Owner:
      type: object
      description: Represents a pet owner registered with the clinic
      properties:
        
        owner_id:
          type: string
        
        first_name:
          type: string
        
        last_name:
          type: string
        
        email:
          type: string
        
        phone_number:
          type: string
        
        address:
          type: string
        
        communication_preference:
          type: string
        
        loyalty_member:
          type: boolean
        
        loyalty_points:
          type: integer
          format: int32
        
        status:
          type: string
        
    
    LoyaltyAccount:
      type: object
      description: Represents a loyalty program account for a pet owner
      properties:
        
        loyalty_account_id:
          type: string
        
        owner_id:
          type: string
        
        points_balance:
          type: integer
          format: int32
        
        tier:
          type: string
        
        enrolled_date:
          type: string
        
    


    RegisterOwner:
      type: object
      properties:
        
        firstName:
          type: string
        
        lastName:
          type: string
        
        email:
          type: string
        
        phoneNumber:
          type: string
        
        address:
          type: string
        
        communicationPreference:
          type: string
        

    UpdateOwnerProfile:
      type: object
      properties:
        
        ownerId:
          type: string
        
        email:
          type: string
        
        phoneNumber:
          type: string
        
        address:
          type: string
        
        communicationPreference:
          type: string
        

    EnrollInLoyaltyProgram:
      type: object
      properties:
        
        ownerId:
          type: string
        

    AwardLoyaltyPoints:
      type: object
      properties:
        
        ownerId:
          type: string
        
        points:
          type: integer
          format: int32
        
        reason:
          type: string
        

    RedeemLoyaltyPoints:
      type: object
      properties:
        
        ownerId:
          type: string
        
        points:
          type: integer
          format: int32
        

    DeactivateOwner:
      type: object
      properties:
        
        ownerId:
          type: string
        
        reason:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string