components:
  schemas:
    
    SalesOrder:
      type: object
      description: Represents a retail sales order for pet products
      properties:
        
        order_id:
          type: string
        
        owner_id:
          type: string
        
        order_date:
          type: string
        
        line_items:
          type: string
        
        subtotal:
          type: number
          format: float
        
        discount_amount:
          type: number
          format: float
        
        tax_amount:
          type: number
          format: float
        
        total_amount:
          type: number
          format: float
        
        channel:
          type: string
        
        status:
          type: string
        
    
    ShoppingCart:
      type: object
      description: Represents a shopping cart for an owner browsing the online store
      properties:
        
        cart_id:
          type: string
        
        owner_id:
          type: string
        
        items:
          type: string
        
        created_at:
          type: string
        
        updated_at:
          type: string
        
    


    AddItemToCart:
      type: object
      properties:
        
        cartId:
          type: string
        
        ownerId:
          type: string
        
        productId:
          type: string
        
        quantity:
          type: int
        

    RemoveItemFromCart:
      type: object
      properties:
        
        cartId:
          type: string
        
        productId:
          type: string
        

    PlaceSalesOrder:
      type: object
      properties:
        
        ownerId:
          type: string
        
        lineItems:
          type: string
        
        channel:
          type: string
        
        discountAmount:
          type: number
          format: float
        

    FulfillSalesOrder:
      type: object
      properties:
        
        orderId:
          type: string
        

    CancelSalesOrder:
      type: object
      properties:
        
        orderId:
          type: string
        
        reason:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string