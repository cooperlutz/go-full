openapi: "3.0.0"
info:
  version: 1.0.0
  title: RetailSales API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/salesorders:
    get:
      operationId: findAllSalesOrders
      responses:
        '200':
          description: A list of SalesOrders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesOrder'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/salesorders/{salesOrderId}:
    get:
      operationId: findOneSalesOrder
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SalesOrder details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrder'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/shoppingcarts:
    get:
      operationId: findAllShoppingCarts
      responses:
        '200':
          description: A list of ShoppingCarts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingCart'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/shoppingcarts/{shoppingCartId}:
    get:
      operationId: findOneShoppingCart
      parameters:
        - name: shoppingCartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ShoppingCart details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingCart'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

