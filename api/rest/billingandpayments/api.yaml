components:
  schemas:
    
    Invoice:
      type: object
      description: Represents a billing invoice for services rendered or products sold
      properties:
        
        invoice_id:
          type: string
        
        owner_id:
          type: string
        
        pet_id:
          type: string
        
        appointment_id:
          type: string
        
        line_items:
          type: string
        
        subtotal:
          type: number
          format: float
        
        discount_amount:
          type: number
          format: float
        
        tax_amount:
          type: number
          format: float
        
        total_amount:
          type: number
          format: float
        
        status:
          type: string
        
        issued_date:
          type: string
        
        due_date:
          type: string
        
    
    Payment:
      type: object
      description: Represents a payment transaction against an invoice
      properties:
        
        payment_id:
          type: string
        
        invoice_id:
          type: string
        
        owner_id:
          type: string
        
        amount_paid:
          type: number
          format: float
        
        payment_method:
          type: string
        
        payment_date:
          type: string
        
        status:
          type: string
        
    
    Refund:
      type: object
      description: Represents a refund issued against a payment
      properties:
        
        refund_id:
          type: string
        
        payment_id:
          type: string
        
        owner_id:
          type: string
        
        refund_amount:
          type: number
          format: float
        
        reason:
          type: string
        
        refund_date:
          type: string
        
        status:
          type: string
        
    


    GenerateInvoice:
      type: object
      properties:
        
        ownerId:
          type: string
        
        petId:
          type: string
        
        appointmentId:
          type: string
        
        lineItems:
          type: string
        
        discountAmount:
          type: number
          format: float
        

    ApplyDiscountToInvoice:
      type: object
      properties:
        
        invoiceId:
          type: string
        
        discountAmount:
          type: number
          format: float
        
        discountReason:
          type: string
        

    ProcessPayment:
      type: object
      properties:
        
        invoiceId:
          type: string
        
        ownerId:
          type: string
        
        amountPaid:
          type: number
          format: float
        
        paymentMethod:
          type: string
        

    IssueRefund:
      type: object
      properties:
        
        paymentId:
          type: string
        
        refundAmount:
          type: number
          format: float
        
        reason:
          type: string
        

    VoidInvoice:
      type: object
      properties:
        
        invoiceId:
          type: string
        
        reason:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string