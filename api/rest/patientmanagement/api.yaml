components:
  schemas:
    
    Pet:
      type: object
      description: Represents a pet patient registered at the clinic
      properties:
        
        pet_id:
          type: string
        
        owner_id:
          type: string
        
        name:
          type: string
        
        species:
          type: string
        
        breed:
          type: string
        
        date_of_birth:
          type: string
        
        gender:
          type: string
        
        weight:
          type: number
          format: float
        
        microchip_number:
          type: string
        
        status:
          type: string
        
    
    MedicalRecord:
      type: object
      description: Represents the medical history and records for a pet
      properties:
        
        medical_record_id:
          type: string
        
        pet_id:
          type: string
        
        veterinarian_id:
          type: string
        
        visit_date:
          type: string
        
        diagnosis:
          type: string
        
        treatment:
          type: string
        
        notes:
          type: string
        
        follow_up_required:
          type: boolean
        
    
    VaccinationRecord:
      type: object
      description: Represents a vaccination record for a pet
      properties:
        
        vaccination_id:
          type: string
        
        pet_id:
          type: string
        
        vaccine_name:
          type: string
        
        administered_date:
          type: string
        
        expiry_date:
          type: string
        
        administered_by:
          type: string
        
    


    RegisterPet:
      type: object
      properties:
        
        ownerId:
          type: string
        
        name:
          type: string
        
        species:
          type: string
        
        breed:
          type: string
        
        dateOfBirth:
          type: string
        
        gender:
          type: string
        
        weight:
          type: number
          format: float
        
        microchipNumber:
          type: string
        

    UpdatePetDetails:
      type: object
      properties:
        
        petId:
          type: string
        
        name:
          type: string
        
        weight:
          type: number
          format: float
        
        microchipNumber:
          type: string
        

    AddMedicalRecord:
      type: object
      properties:
        
        petId:
          type: string
        
        veterinarianId:
          type: string
        
        visitDate:
          type: string
        
        diagnosis:
          type: string
        
        treatment:
          type: string
        
        notes:
          type: string
        
        followUpRequired:
          type: boolean
        

    RecordVaccination:
      type: object
      properties:
        
        petId:
          type: string
        
        vaccineName:
          type: string
        
        administeredDate:
          type: string
        
        expiryDate:
          type: string
        
        administeredBy:
          type: string
        

    DeactivatePet:
      type: object
      properties:
        
        petId:
          type: string
        
        reason:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string