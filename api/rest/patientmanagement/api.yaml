openapi: "3.0.0"
info:
  version: 1.0.0
  title: PatientManagement API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/pets:
    get:
      operationId: findAllPets
      responses:
        '200':
          description: A list of Pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/pets/{petId}:
    get:
      operationId: findOnePet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pet details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/medicalrecords:
    get:
      operationId: findAllMedicalRecords
      responses:
        '200':
          description: A list of MedicalRecords
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedicalRecord'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/medicalrecords/{medicalRecordId}:
    get:
      operationId: findOneMedicalRecord
      parameters:
        - name: medicalRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MedicalRecord details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecord'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/vaccinationrecords:
    get:
      operationId: findAllVaccinationRecords
      responses:
        '200':
          description: A list of VaccinationRecords
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VaccinationRecord'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/vaccinationrecords/{vaccinationRecordId}:
    get:
      operationId: findOneVaccinationRecord
      parameters:
        - name: vaccinationRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: VaccinationRecord details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaccinationRecord'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

