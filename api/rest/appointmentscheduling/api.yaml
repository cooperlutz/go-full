openapi: "3.0.0"
info:
  version: 1.0.0
  title: AppointmentScheduling API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/appointments:
    get:
      operationId: findAllAppointments
      responses:
        '200':
          description: A list of Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/appointments/{appointmentId}:
    get:
      operationId: findOneAppointment
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Appointment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/telemedicinesessions:
    get:
      operationId: findAllTelemedicineSessions
      responses:
        '200':
          description: A list of TelemedicineSessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TelemedicineSession'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/telemedicinesessions/{telemedicineSessionId}:
    get:
      operationId: findOneTelemedicineSession
      parameters:
        - name: telemedicineSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: TelemedicineSession details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemedicineSession'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

