components:
  schemas:
    
    Appointment:
      type: object
      description: Represents a scheduled appointment at the clinic
      properties:
        
        appointment_id:
          type: string
        
        pet_id:
          type: string
        
        owner_id:
          type: string
        
        veterinarian_id:
          type: string
        
        appointment_type:
          type: string
        
        scheduled_date:
          type: string
        
        scheduled_time:
          type: string
        
        duration_minutes:
          type: integer
          format: int32
        
        status:
          type: string
        
        notes:
          type: string
        
        is_telemedicine:
          type: boolean
        
    
    TelemedicineSession:
      type: object
      description: Represents a telemedicine session linked to an appointment
      properties:
        
        session_id:
          type: string
        
        appointment_id:
          type: string
        
        session_url:
          type: string
        
        started_at:
          type: string
        
        ended_at:
          type: string
        
        status:
          type: string
        
    


    ScheduleAppointment:
      type: object
      properties:
        
        petId:
          type: string
        
        ownerId:
          type: string
        
        veterinarianId:
          type: string
        
        appointmentType:
          type: string
        
        scheduledDate:
          type: string
        
        scheduledTime:
          type: string
        
        durationMinutes:
          type: integer
          format: int32
        
        notes:
          type: string
        
        isTelemedicine:
          type: boolean
        

    RescheduleAppointment:
      type: object
      properties:
        
        appointmentId:
          type: string
        
        newScheduledDate:
          type: string
        
        newScheduledTime:
          type: string
        
        reason:
          type: string
        

    CancelAppointment:
      type: object
      properties:
        
        appointmentId:
          type: string
        
        reason:
          type: string
        
        cancelledBy:
          type: string
        

    ConfirmAppointment:
      type: object
      properties:
        
        appointmentId:
          type: string
        

    CompleteAppointment:
      type: object
      properties:
        
        appointmentId:
          type: string
        
        veterinarianId:
          type: string
        

    StartTelemedicineSession:
      type: object
      properties:
        
        appointmentId:
          type: string
        

    EndTelemedicineSession:
      type: object
      properties:
        
        sessionId:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string