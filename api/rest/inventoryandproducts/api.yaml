openapi: "3.0.0"
info:
  version: 1.0.0
  title: InventoryAndProducts API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/products:
    get:
      operationId: findAllProducts
      responses:
        '200':
          description: A list of Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/products/{productId}:
    get:
      operationId: findOneProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/inventoryitems:
    get:
      operationId: findAllInventoryItems
      responses:
        '200':
          description: A list of InventoryItems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItem'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/inventoryitems/{inventoryItemId}:
    get:
      operationId: findOneInventoryItem
      parameters:
        - name: inventoryItemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: InventoryItem details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/suppliers:
    get:
      operationId: findAllSuppliers
      responses:
        '200':
          description: A list of Suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Supplier'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/suppliers/{supplierId}:
    get:
      operationId: findOneSupplier
      parameters:
        - name: supplierId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Supplier details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supplier'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/purchaseorders:
    get:
      operationId: findAllPurchaseOrders
      responses:
        '200':
          description: A list of PurchaseOrders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchaseOrder'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/purchaseorders/{purchaseOrderId}:
    get:
      operationId: findOnePurchaseOrder
      parameters:
        - name: purchaseOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PurchaseOrder details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

