components:
  schemas:
    
    Product:
      type: object
      description: Represents a product available for sale or use in the clinic
      properties:
        
        product_id:
          type: string
        
        name:
          type: string
        
        description:
          type: string
        
        category:
          type: string
        
        unit_price:
          type: number
          format: float
        
        sku:
          type: string
        
        supplier_id:
          type: string
        
        is_active:
          type: boolean
        
    
    InventoryItem:
      type: object
      description: Represents the stock level of a product in the clinic
      properties:
        
        inventory_item_id:
          type: string
        
        product_id:
          type: string
        
        quantity_on_hand:
          type: integer
          format: int32
        
        reorder_threshold:
          type: integer
          format: int32
        
        reorder_quantity:
          type: integer
          format: int32
        
        last_restocked_date:
          type: string
        
    
    Supplier:
      type: object
      description: Represents a supplier providing products or medical supplies to the clinic
      properties:
        
        supplier_id:
          type: string
        
        name:
          type: string
        
        contact_name:
          type: string
        
        email:
          type: string
        
        phone_number:
          type: string
        
        product_categories:
          type: string
        
        status:
          type: string
        
    
    PurchaseOrder:
      type: object
      description: Represents a purchase order placed with a supplier for stock replenishment
      properties:
        
        purchase_order_id:
          type: string
        
        supplier_id:
          type: string
        
        order_date:
          type: string
        
        expected_delivery_date:
          type: string
        
        line_items:
          type: string
        
        total_cost:
          type: number
          format: float
        
        status:
          type: string
        
    


    AddProductToCatalog:
      type: object
      properties:
        
        name:
          type: string
        
        description:
          type: string
        
        category:
          type: string
        
        unitPrice:
          type: number
          format: float
        
        sku:
          type: string
        
        supplierId:
          type: string
        

    UpdateProductPrice:
      type: object
      properties:
        
        productId:
          type: string
        
        newUnitPrice:
          type: number
          format: float
        

    RestockInventory:
      type: object
      properties:
        
        productId:
          type: string
        
        quantityAdded:
          type: integer
          format: int32
        
        purchaseOrderId:
          type: string
        

    DeductInventory:
      type: object
      properties:
        
        productId:
          type: string
        
        quantityDeducted:
          type: integer
          format: int32
        
        reason:
          type: string
        

    PlacePurchaseOrder:
      type: object
      properties:
        
        supplierId:
          type: string
        
        lineItems:
          type: string
        
        expectedDeliveryDate:
          type: string
        

    ReceivePurchaseOrder:
      type: object
      properties:
        
        purchaseOrderId:
          type: string
        
        receivedDate:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string