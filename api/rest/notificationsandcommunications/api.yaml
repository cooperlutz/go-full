components:
  schemas:
    
    Notification:
      type: object
      description: Represents a notification sent to a pet owner or staff member
      properties:
        
        notification_id:
          type: string
        
        recipient_id:
          type: string
        
        recipient_type:
          type: string
        
        channel:
          type: string
        
        subject:
          type: string
        
        message_body:
          type: string
        
        status:
          type: string
        
        sent_at:
          type: string
        
        notification_type:
          type: string
        
    
    NotificationTemplate:
      type: object
      description: Represents a reusable template for generating notifications
      properties:
        
        template_id:
          type: string
        
        name:
          type: string
        
        notification_type:
          type: string
        
        channel:
          type: string
        
        subject_template:
          type: string
        
        body_template:
          type: string
        
        is_active:
          type: boolean
        
    


    SendNotification:
      type: object
      properties:
        
        recipientId:
          type: string
        
        recipientType:
          type: string
        
        channel:
          type: string
        
        notificationType:
          type: string
        
        templateId:
          type: string
        
        messageBody:
          type: string
        

    ScheduleNotification:
      type: object
      properties:
        
        recipientId:
          type: string
        
        recipientType:
          type: string
        
        channel:
          type: string
        
        notificationType:
          type: string
        
        scheduledSendTime:
          type: string
        
        templateId:
          type: string
        

    CancelScheduledNotification:
      type: object
      properties:
        
        notificationId:
          type: string
        

    CreateNotificationTemplate:
      type: object
      properties:
        
        name:
          type: string
        
        notificationType:
          type: string
        
        channel:
          type: string
        
        subjectTemplate:
          type: string
        
        bodyTemplate:
          type: string
        


    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string