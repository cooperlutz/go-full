openapi: "3.0.0"
info:
  version: 1.0.0
  title: NotificationsAndCommunications API
servers:
  - url: https://{hostname}/api
    variables:
      hostname:
        default: localhost
paths:
  
  /v1/notifications:
    get:
      operationId: findAllNotifications
      responses:
        '200':
          description: A list of Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/notifications/{notificationId}:
    get:
      operationId: findOneNotification
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notification details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /v1/notificationtemplates:
    get:
      operationId: findAllNotificationTemplates
      responses:
        '200':
          description: A list of NotificationTemplates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationTemplate'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/notificationtemplates/{notificationTemplateId}:
    get:
      operationId: findOneNotificationTemplate
      parameters:
        - name: notificationTemplateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: NotificationTemplate details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplate'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  

